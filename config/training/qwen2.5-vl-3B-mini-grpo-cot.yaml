name: qwen2.5-vl-3B-mini-grpo-cot
description: AutoVLA based on Qwen 2.5 VL 3B model GRPO fine-tuning on NuPlan mini split with GPT-4o CoT

model:
  use_cot: true
  pretrained_model_path: /export/scratch_large/ding/code/AutoVLA/model_weights/Qwen2.5-VL-3B-Instruct
  sft_model_path: /export/scratch_large/ding/code/AutoVLA/runs/sft/2026-02-25_17-08-08/epoch=0-loss=2.2746.ckpt
  codebook_cache_path: "codebook_cache/agent_vocab.pkl"
  train_vision_backbone: false
  train_lm_backbone: true
  lora:
    use: true
    task_type: CAUSAL_LM
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
    r: 8
    alpha: 8
    dropout: 0.1
    bias: "none"
  trajectory: # future trajectory parameters
    num_poses: 10
    interval_length: 0.5
    time_horizon: 5.0
  tokens: # action token parameters, depends on the pretrained large model
    action_start_id: 151665
    ignore_index: -100
    assistant_id: [151644, 77091]
  video:
    min_pixels: 109760
    max_pixels: 109760

data:
  train:
    path: /export/scratch_large/ding/navsim_workspace/dataset/placeholder/mini
    scene_filter: navsim/navsim/planning/script/config/common/train_test_split/scene_filter/navmini.yaml
    metric_cache_path: /export/scratch_large/ding/navsim_workspace/navmini_metric_cache
    json_dataset_path: /export/scratch_large/ding/navsim_workspace/preprocessed/mini_cot_gpt-4o
    sensor_data_path: /export/scratch_large/ding/navsim_workspace/dataset/sensor_blobs/mini
  val:
    path: /export/scratch_large/ding/navsim_workspace/dataset/placeholder/mini
    scene_filter: navsim/navsim/planning/script/config/common/train_test_split/scene_filter/navmini.yaml
    metric_cache_path: /export/scratch_large/ding/navsim_workspace/navmini_metric_cache
    json_dataset_path: /export/scratch_large/ding/navsim_workspace/preprocessed/mini_cot_gpt-4o
    sensor_data_path: /export/scratch_large/ding/navsim_workspace/dataset/sensor_blobs/mini

training:
  batch_size: 1
  learning_rate: 0.00003
  epochs: 1
  num_workers: 1
  weight_decay: 0.01
  devices: [0, 1]
  sample:
    max_length: 2048
    temperature: 0.2
    top_k: 0.0
    top_p: 1.0

rl:
  kl_beta: 0.04
  reward:
    sliding_window_size: 100
    scale: 10
  cot_penalty:
    coef: 0.002
    center: 400.0
    weight: 0.3

inference:
  batch_size: 1
  num_workers: 1
  max_length: 2048
  sample:
    temperature: 0.2
    top_k: 0.0
    top_p: 1.0