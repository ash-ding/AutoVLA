name: symbolic-cot-gpt4o-mini
description: Symbolic CoT preprocessing using GPT-4o-mini on navmini split

# Annotation backend
annotation_backend: openai
api_model: gpt-4o-mini
# api_key: null  # uses OPENAI_API_KEY env var
max_tokens: 1200
temperature: 0
image_detail: low

# RLIB
rlib_dir: ./RLIB

# Dataset
dataset_name: nuplan
dataset_path: /export/scratch_large/ding/navsim_workspace/dataset/placeholder/mini
scene_filter: /export/scratch_large/ding/code/AutoVLA/navsim/navsim/planning/script/config/common/train_test_split/scene_filter/navmini.yaml
